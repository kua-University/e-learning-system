version: "3.8"

services:

  backend:
    build: ../backend
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app
    depends_on:
      - redis

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    stdin_open: true
    tty: true

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"